<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BangBangMang - AI Agent Task Center</title>
  <!-- E2E test passed -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            dark: { 50: '#f8fafc', 100: '#1e293b', 200: '#1a2332', 300: '#151d2b', 400: '#111827', 500: '#0d1321' }
          }
        }
      }
    }
  </script>
  <style>
    body { background: #0d1321; }
    .fade-in { animation: fadeIn .2s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="min-h-screen text-gray-200">
  <div id="app"></div>

  <script>
  // ─── Config ───────────────────────────────────────────────
  const STORAGE_KEYS = { token: 'bbm_token', repo: 'bbm_repo' };

  function getToken() { return localStorage.getItem(STORAGE_KEYS.token) || ''; }
  function getRepo() { return localStorage.getItem(STORAGE_KEYS.repo) || '743v45/bangbangmang'; }
  function setToken(v) { localStorage.setItem(STORAGE_KEYS.token, v); }
  function setRepo(v) { localStorage.setItem(STORAGE_KEYS.repo, v); }
  function isLoggedIn() { return !!getToken(); }

  // ─── GitHub API ───────────────────────────────────────────
  async function api(path, opts = {}) {
    const token = getToken();
    const headers = { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' };
    if (opts.body) headers['Content-Type'] = 'application/json';
    const res = await fetch(`https://api.github.com/repos/${getRepo()}${path}`, { ...opts, headers });
    if (res.status === 204) return null;
    const data = await res.json();
    if (!res.ok) throw new Error(data.message || `API error ${res.status}`);
    return data;
  }

  async function listIssues(state = 'open', labels = '') {
    let path = `/issues?state=${state}&per_page=100&sort=updated&direction=desc`;
    if (labels) path += `&labels=${labels}`;
    return api(path);
  }

  async function getIssue(num) { return api(`/issues/${num}`); }

  async function createIssue(title, body, labels) {
    return api('/issues', { method: 'POST', body: JSON.stringify({ title, body, labels }) });
  }

  async function updateIssue(num, data) {
    return api(`/issues/${num}`, { method: 'PATCH', body: JSON.stringify(data) });
  }

  async function triggerWorkflow(issue_number, target_repo, agent) {
    return api('/actions/workflows/run-agent.yml/dispatches', {
      method: 'POST',
      body: JSON.stringify({ ref: 'master', inputs: { issue_number: String(issue_number), target_repo: target_repo || '', agent: agent || 'opencode' } })
    });
  }

  async function listRuns(per_page = 10) {
    return api(`/actions/runs?per_page=${per_page}`);
  }

  async function getWorkflowRuns(workflow_id, per_page = 5) {
    return api(`/actions/workflows/${workflow_id}/runs?per_page=${per_page}`);
  }

  // ─── Issue Body Parser ────────────────────────────────────
  function parseIssueBody(body) {
    if (!body) return { targetRepo: '', execTime: '', agent: 'opencode', prompt: '' };
    const repo = (body.match(/\*\*目标项目\*\*:\s*(\S+)/) || [])[1] || '';
    const time = (body.match(/\*\*执行时间\*\*:\s*(.+)/) || [])[1] || '';
    const agent = (body.match(/\*\*AI 客户端\*\*:\s*(\S+)/) || [])[1] || 'opencode';
    const promptMatch = body.match(/## 提示词\s*\n([\s\S]*)/);
    const prompt = promptMatch ? promptMatch[1].trim() : '';
    return { targetRepo: repo, execTime: time.trim(), agent, prompt };
  }

  function buildIssueBody({ targetRepo, execTime, agent, prompt }) {
    return `## 任务配置\n\n- **目标项目**: ${targetRepo || getRepo()}\n- **执行时间**: ${execTime || '立即'}\n- **AI 客户端**: ${agent || 'opencode'}\n- **状态**: pending\n\n## 提示词\n\n${prompt || ''}`;
  }

  // ─── Status Helpers ───────────────────────────────────────
  function getStatusLabel(labels) {
    if (!labels) return '';
    const statusLabels = labels.filter(l => l.name.startsWith('status:'));
    if (statusLabels.length === 0) return '';
    return statusLabels[0].name.replace('status:', '');
  }

  function statusBadge(status) {
    const map = {
      pending:     { bg: 'bg-yellow-900/40 text-yellow-300 border-yellow-700', icon: '⏳' },
      running:     { bg: 'bg-blue-900/40 text-blue-300 border-blue-700', icon: '🔄' },
      'pr-created':{ bg: 'bg-purple-900/40 text-purple-300 border-purple-700', icon: '🔀' },
      done:        { bg: 'bg-green-900/40 text-green-300 border-green-700', icon: '✅' },
      failed:      { bg: 'bg-red-900/40 text-red-300 border-red-700', icon: '❌' },
    };
    const s = map[status] || { bg: 'bg-gray-700 text-gray-300 border-gray-600', icon: '❓' };
    return `<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded text-xs font-medium border ${s.bg}">${s.icon} ${status || 'unknown'}</span>`;
  }

  function runStatusBadge(status, conclusion) {
    if (status === 'completed') {
      return conclusion === 'success'
        ? '<span class="text-green-400 text-xs">✅ success</span>'
        : `<span class="text-red-400 text-xs">❌ ${conclusion || 'failed'}</span>`;
    }
    if (status === 'in_progress') return '<span class="text-blue-400 text-xs">🔄 running</span>';
    return '<span class="text-yellow-400 text-xs">⏳ queued</span>';
  }

  function timeAgo(dateStr) {
    if (!dateStr) return '';
    const diff = Date.now() - new Date(dateStr).getTime();
    const mins = Math.floor(diff / 60000);
    if (mins < 1) return '刚刚';
    if (mins < 60) return `${mins}分钟前`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return `${hrs}小时前`;
    const days = Math.floor(hrs / 24);
    return `${days}天前`;
  }

  // ─── Router ───────────────────────────────────────────────
  function getRoute() { return location.hash.slice(1) || 'issues'; }

  function navigate(route) {
    location.hash = route;
  }

  window.addEventListener('hashchange', render);

  // ─── Icons (inline SVG helpers) ───────────────────────────
  const icons = {
    settings: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><circle cx="12" cy="12" r="3"/></svg>',
    list: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>',
    plus: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>',
    play: '<svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>',
    edit: '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>',
    refresh: '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>',
    runs: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>',
    back: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>',
    github: '<svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>',
  };

  // ─── Toast ────────────────────────────────────────────────
  function toast(msg, type = 'info') {
    const colors = { info: 'bg-blue-600', success: 'bg-green-600', error: 'bg-red-600' };
    const el = document.createElement('div');
    el.className = `fixed bottom-4 right-4 px-4 py-2 rounded-lg text-white text-sm font-medium ${colors[type] || colors.info} shadow-lg z-50 fade-in`;
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 3000);
  }

  // ─── Layout ───────────────────────────────────────────────
  function renderNav(active) {
    const items = [
      { id: 'issues', label: '任务列表', icon: icons.list },
      { id: 'create', label: '创建任务', icon: icons.plus },
      { id: 'runs', label: '执行记录', icon: icons.runs },
      { id: 'settings', label: '设置', icon: icons.settings },
    ];
    return `
      <nav class="bg-dark-300 border-b border-gray-700">
        <div class="max-w-5xl mx-auto px-4 flex items-center h-14 gap-1">
          <span class="font-bold text-lg text-white mr-6 cursor-pointer" onclick="navigate('issues')">BangBangMang</span>
          ${items.map(i => `
            <button onclick="navigate('${i.id}')"
              class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm font-medium transition-colors
              ${active === i.id ? 'bg-blue-600/20 text-blue-400' : 'text-gray-400 hover:text-white hover:bg-gray-700/50'}">
              ${i.icon} <span class="hidden sm:inline">${i.label}</span>
            </button>
          `).join('')}
          <div class="flex-1"></div>
          <span class="text-xs text-gray-500">${getRepo()}</span>
        </div>
      </nav>
    `;
  }

  function renderLayout(active, content) {
    if (!isLoggedIn() && active !== 'settings') {
      navigate('settings');
      return '';
    }
    return `${renderNav(active)}<main class="max-w-5xl mx-auto px-4 py-6 fade-in">${content}</main>`;
  }

  // ─── Pages ────────────────────────────────────────────────

  // Settings
  function renderSettings() {
    const content = `
      <div class="max-w-md mx-auto">
        <h2 class="text-xl font-bold text-white mb-6">设置</h2>
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-400 mb-1">GitHub Token</label>
            <input id="inp-token" type="password" placeholder="ghp_xxxx..."
              value="${getToken()}"
              class="w-full px-3 py-2 bg-dark-400 border border-gray-600 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:border-blue-500" />
            <p class="text-xs text-gray-500 mt-1">需要 repo scope 权限的 PAT</p>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-400 mb-1">仓库地址</label>
            <input id="inp-repo" type="text" placeholder="owner/repo"
              value="${getRepo()}"
              class="w-full px-3 py-2 bg-dark-400 border border-gray-600 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:border-blue-500" />
          </div>
          <button onclick="saveSettings()"
            class="w-full py-2 px-4 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-medium transition-colors">
            保存
          </button>
        </div>
      </div>
    `;
    document.getElementById('app').innerHTML = renderLayout('settings', content);
  }

  window.saveSettings = function() {
    const token = document.getElementById('inp-token').value.trim();
    const repo = document.getElementById('inp-repo').value.trim();
    if (!token) { toast('请输入 Token', 'error'); return; }
    if (!repo || !repo.includes('/')) { toast('请输入正确的仓库地址 (owner/repo)', 'error'); return; }
    setToken(token);
    setRepo(repo);
    toast('设置已保存', 'success');
    navigate('issues');
  };

  // Issues List
  let issuesCache = [];
  let issuesFilter = '';

  async function renderIssues() {
    const content = `
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-xl font-bold text-white">任务列表</h2>
        <div class="flex items-center gap-2">
          <select id="filter-status" onchange="filterIssues(this.value)"
            class="px-2 py-1 bg-dark-400 border border-gray-600 rounded text-sm text-white focus:outline-none">
            <option value="">全部状态</option>
            <option value="status:pending">⏳ 等待中</option>
            <option value="status:running">🔄 执行中</option>
            <option value="status:pr-created">🔀 PR 已创建</option>
            <option value="status:done">✅ 已完成</option>
            <option value="status:failed">❌ 失败</option>
          </select>
          <button onclick="refreshIssues()" class="p-1.5 rounded-lg text-gray-400 hover:text-white hover:bg-gray-700 transition-colors">
            ${icons.refresh}
          </button>
        </div>
      </div>
      <div id="issues-list">
        <div class="text-center text-gray-500 py-8">加载中...</div>
      </div>
    `;
    document.getElementById('app').innerHTML = renderLayout('issues', content);
    await loadIssues();
  }

  async function loadIssues() {
    try {
      const data = await listIssues('all', issuesFilter);
      issuesCache = data.filter(i => !i.pull_request);
      renderIssuesList();
    } catch (e) {
      document.getElementById('issues-list').innerHTML = `<div class="text-red-400 py-4">加载失败: ${e.message}</div>`;
    }
  }

  function renderIssuesList() {
    const list = document.getElementById('issues-list');
    if (!issuesCache.length) {
      list.innerHTML = `<div class="text-center text-gray-500 py-8">暂无任务</div>`;
      return;
    }
    list.innerHTML = issuesCache.map(issue => {
      const p = parseIssueBody(issue.body);
      const status = getStatusLabel(issue.labels);
      return `
        <div class="bg-dark-200 border border-gray-700 rounded-lg p-4 mb-3 hover:border-gray-600 transition-colors">
          <div class="flex items-start justify-between gap-3">
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-2 mb-1">
                ${statusBadge(status)}
                <span class="text-gray-500 text-xs">#${issue.number}</span>
              </div>
              <h3 class="text-white font-medium truncate cursor-pointer hover:text-blue-400"
                onclick="navigate('edit-${issue.number}')">${issue.title}</h3>
              <div class="flex items-center gap-3 mt-2 text-xs text-gray-500">
                ${p.targetRepo ? `<span>📁 ${p.targetRepo}</span>` : ''}
                ${p.execTime ? `<span>🕐 ${p.execTime}</span>` : ''}
                <span>🕐 ${timeAgo(issue.updated_at)}</span>
              </div>
            </div>
            <div class="flex items-center gap-1 shrink-0">
              ${(status === 'pending' || status === 'failed') ? `
                <button onclick="triggerTask(${issue.number})"
                  class="p-2 rounded-lg bg-green-600/20 text-green-400 hover:bg-green-600/40 transition-colors" title="立即执行">
                  ${icons.play}
                </button>
              ` : ''}
              <button onclick="navigate('edit-${issue.number}')"
                class="p-2 rounded-lg text-gray-400 hover:text-white hover:bg-gray-700 transition-colors" title="编辑">
                ${icons.edit}
              </button>
              <a href="${issue.html_url}" target="_blank"
                class="p-2 rounded-lg text-gray-400 hover:text-white hover:bg-gray-700 transition-colors" title="在 GitHub 查看">
                ${icons.github}
              </a>
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  window.filterIssues = function(val) { issuesFilter = val; loadIssues(); };
  window.refreshIssues = function() { loadIssues(); toast('已刷新'); };

  window.triggerTask = async function(num) {
    try {
      const issue = await getIssue(num);
      const p = parseIssueBody(issue.body);
      await triggerWorkflow(num, p.targetRepo, p.agent);
      toast('已触发执行', 'success');
      await loadIssues();
    } catch (e) {
      toast(`触发失败: ${e.message}`, 'error');
    }
  };

  // Create Issue
  function renderCreate(prefill = {}) {
    const content = `
      <div class="max-w-lg mx-auto">
        <h2 class="text-xl font-bold text-white mb-6">创建任务</h2>
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-400 mb-1">标题</label>
            <input id="inp-title" type="text" placeholder="任务名称" value="${prefill.title || ''}"
              class="w-full px-3 py-2 bg-dark-400 border border-gray-600 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:border-blue-500" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-400 mb-1">目标项目</label>
            <input id="inp-target" type="text" placeholder="owner/repo（空则操作本仓库）" value="${prefill.targetRepo || ''}"
              class="w-full px-3 py-2 bg-dark-400 border border-gray-600 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:border-blue-500" />
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium text-gray-400 mb-1">执行时间</label>
              <input id="inp-time" type="datetime-local"
                class="w-full px-3 py-2 bg-dark-400 border border-gray-600 rounded-lg text-white focus:outline-none focus:border-blue-500" />
              <p class="text-xs text-gray-500 mt-1">留空则手动触发</p>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-400 mb-1">AI 客户端</label>
              <select id="inp-agent"
                class="w-full px-3 py-2 bg-dark-400 border border-gray-600 rounded-lg text-white focus:outline-none focus:border-blue-500">
                <option value="opencode" ${(prefill.agent || 'opencode') === 'opencode' ? 'selected' : ''}>opencode</option>
                <option value="claude-code" ${prefill.agent === 'claude-code' ? 'selected' : ''}>claude-code</option>
              </select>
            </div>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-400 mb-1">提示词</label>
            <textarea id="inp-prompt" rows="8" placeholder="描述 AI Agent 需要执行的任务..."
              class="w-full px-3 py-2 bg-dark-400 border border-gray-600 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:border-blue-500 resize-y">${prefill.prompt || ''}</textarea>
          </div>
          <div class="flex gap-3">
            <button onclick="submitCreate()"
              class="flex-1 py-2 px-4 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-medium transition-colors">
              创建任务
            </button>
            <button onclick="submitCreateAndTrigger()"
              class="flex-1 py-2 px-4 bg-green-600 hover:bg-green-700 text-white rounded-lg font-medium transition-colors">
              创建并立即执行
            </button>
          </div>
        </div>
      </div>
    `;
    document.getElementById('app').innerHTML = renderLayout('create', content);
  }

  window.submitCreate = async function(andTrigger = false) {
    const title = document.getElementById('inp-title').value.trim();
    const prompt = document.getElementById('inp-prompt').value.trim();
    if (!title) { toast('请输入标题', 'error'); return; }

    const targetRepo = document.getElementById('inp-target').value.trim();
    const timeVal = document.getElementById('inp-time').value;
    const execTime = timeVal ? timeVal.replace('T', ' ') : '';
    const agent = document.getElementById('inp-agent').value;

    const body = buildIssueBody({ targetRepo, execTime, agent, prompt });

    try {
      const issue = await createIssue(title, body, ['status:pending']);
      toast(`任务 #${issue.number} 已创建`, 'success');
      if (andTrigger) {
        await triggerWorkflow(issue.number, targetRepo, agent);
        toast('已触发执行', 'success');
      }
      navigate('issues');
    } catch (e) {
      toast(`创建失败: ${e.message}`, 'error');
    }
  };

  window.submitCreateAndTrigger = function() { window.submitCreate(true); };

  // Edit Issue
  async function renderEdit(num) {
    let issue;
    try {
      issue = await getIssue(num);
    } catch (e) {
      document.getElementById('app').innerHTML = renderLayout('issues', `<div class="text-red-400 py-4">加载失败: ${e.message}</div>`);
      return;
    }
    const p = parseIssueBody(issue.body);
    const status = getStatusLabel(issue.labels);

    const content = `
      <div class="max-w-lg mx-auto">
        <div class="flex items-center gap-3 mb-6">
          <button onclick="navigate('issues')" class="p-1 rounded text-gray-400 hover:text-white">${icons.back}</button>
          <h2 class="text-xl font-bold text-white">编辑任务 #${num}</h2>
          ${statusBadge(status)}
        </div>
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-400 mb-1">标题</label>
            <input id="edit-title" type="text" value="${issue.title}"
              class="w-full px-3 py-2 bg-dark-400 border border-gray-600 rounded-lg text-white focus:outline-none focus:border-blue-500" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-400 mb-1">目标项目</label>
            <input id="edit-target" type="text" value="${p.targetRepo}"
              class="w-full px-3 py-2 bg-dark-400 border border-gray-600 rounded-lg text-white focus:outline-none focus:border-blue-500" />
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium text-gray-400 mb-1">执行时间</label>
              <input id="edit-time" type="text" value="${p.execTime}" placeholder="2026-05-28 15:00"
                class="w-full px-3 py-2 bg-dark-400 border border-gray-600 rounded-lg text-white focus:outline-none focus:border-blue-500" />
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-400 mb-1">AI 客户端</label>
              <select id="edit-agent"
                class="w-full px-3 py-2 bg-dark-400 border border-gray-600 rounded-lg text-white focus:outline-none focus:border-blue-500">
                <option value="opencode" ${p.agent === 'opencode' ? 'selected' : ''}>opencode</option>
                <option value="claude-code" ${p.agent === 'claude-code' ? 'selected' : ''}>claude-code</option>
              </select>
            </div>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-400 mb-1">提示词</label>
            <textarea id="edit-prompt" rows="8"
              class="w-full px-3 py-2 bg-dark-400 border border-gray-600 rounded-lg text-white focus:outline-none focus:border-blue-500 resize-y">${p.prompt}</textarea>
          </div>
          <div class="flex gap-3">
            <button onclick="submitEdit(${num})"
              class="flex-1 py-2 px-4 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-medium transition-colors">
              保存修改
            </button>
            ${(status === 'pending' || status === 'failed') ? `
              <button onclick="triggerAndGo(${num})"
                class="flex-1 py-2 px-4 bg-green-600 hover:bg-green-700 text-white rounded-lg font-medium transition-colors">
                立即执行
              </button>
            ` : ''}
            <button onclick="closeIssue(${num})"
              class="py-2 px-4 bg-gray-700 hover:bg-gray-600 text-white rounded-lg font-medium transition-colors">
              关闭
            </button>
          </div>
        </div>
      </div>
    `;
    document.getElementById('app').innerHTML = renderLayout('issues', content);
  }

  window.submitEdit = async function(num) {
    const title = document.getElementById('edit-title').value.trim();
    const targetRepo = document.getElementById('edit-target').value.trim();
    const execTime = document.getElementById('edit-time').value.trim();
    const agent = document.getElementById('edit-agent').value;
    const prompt = document.getElementById('edit-prompt').value.trim();
    const body = buildIssueBody({ targetRepo, execTime, agent, prompt });
    try {
      await updateIssue(num, { title, body });
      toast('已保存', 'success');
      navigate('issues');
    } catch (e) {
      toast(`保存失败: ${e.message}`, 'error');
    }
  };

  window.triggerAndGo = async function(num) {
    try {
      const issue = await getIssue(num);
      const p = parseIssueBody(issue.body);
      await triggerWorkflow(num, p.targetRepo, p.agent);
      toast('已触发执行', 'success');
      navigate('issues');
    } catch (e) {
      toast(`触发失败: ${e.message}`, 'error');
    }
  };

  window.closeIssue = async function(num) {
    if (!confirm('确定关闭此任务？')) return;
    try {
      await updateIssue(num, { state: 'closed' });
      toast('已关闭', 'success');
      navigate('issues');
    } catch (e) {
      toast(`关闭失败: ${e.message}`, 'error');
    }
  };

  // Runs
  let runsCache = [];

  async function renderRuns() {
    const content = `
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-xl font-bold text-white">执行记录</h2>
        <button onclick="refreshRuns()" class="p-1.5 rounded-lg text-gray-400 hover:text-white hover:bg-gray-700 transition-colors">
          ${icons.refresh}
        </button>
      </div>
      <div id="runs-list">
        <div class="text-center text-gray-500 py-8">加载中...</div>
      </div>
    `;
    document.getElementById('app').innerHTML = renderLayout('runs', content);
    await loadRuns();
  }

  async function loadRuns() {
    try {
      const data = await getWorkflowRuns('run-agent.yml', 20);
      runsCache = data.workflow_runs || [];
      renderRunsList();
    } catch (e) {
      document.getElementById('runs-list').innerHTML = `<div class="text-red-400 py-4">加载失败: ${e.message}</div>`;
    }
  }

  function renderRunsList() {
    const list = document.getElementById('runs-list');
    if (!runsCache.length) {
      list.innerHTML = `<div class="text-center text-gray-500 py-8">暂无执行记录</div>`;
      return;
    }
    list.innerHTML = runsCache.map(run => {
      const inputs = run.inputs || {};
      return `
        <div class="bg-dark-200 border border-gray-700 rounded-lg p-4 mb-3">
          <div class="flex items-center justify-between">
            <div class="flex-1">
              <div class="flex items-center gap-2 mb-1">
                ${runStatusBadge(run.status, run.conclusion)}
                <span class="text-gray-400 text-xs">#${run.run_number}</span>
              </div>
              <div class="text-sm text-gray-300">
                Issue #${inputs.issue_number || '-'}
                ${inputs.target_repo ? ` → ${inputs.target_repo}` : ''}
                <span class="text-gray-500">via ${inputs.agent || 'opencode'}</span>
              </div>
              <div class="text-xs text-gray-500 mt-1">
                ${run.created_at ? new Date(run.created_at).toLocaleString('zh-CN') : ''}
                ${run.updated_at && run.run_started_at ? ` (${Math.round((new Date(run.updated_at) - new Date(run.run_started_at)) / 60000)}分钟)` : ''}
              </div>
            </div>
            <a href="${run.html_url}" target="_blank"
              class="p-2 rounded-lg text-gray-400 hover:text-white hover:bg-gray-700 transition-colors">
              ${icons.github}
            </a>
          </div>
        </div>
      `;
    }).join('');
  }

  window.refreshRuns = function() { loadRuns(); toast('已刷新'); };

  // ─── Main Render ──────────────────────────────────────────
  async function render() {
    const route = getRoute();
    const app = document.getElementById('app');

    if (route === 'settings') { renderSettings(); return; }
    if (!isLoggedIn()) { navigate('settings'); return; }

    if (route === 'issues') { await renderIssues(); }
    else if (route === 'create') { renderCreate(); }
    else if (route === 'runs') { await renderRuns(); }
    else if (route.startsWith('edit-')) {
      const num = route.split('edit-')[1];
      await renderEdit(num);
    }
    else { navigate('issues'); }
  }

  // ─── Init ─────────────────────────────────────────────────
  render();
  </script>
</body>
</html>
