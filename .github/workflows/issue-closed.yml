name: Issue Closed Label Sync

on:
  issues:
    types: [closed]

jobs:
  sync-label:
    runs-on: ubuntu-latest
    if: "!contains(github.event.issue.labels.*.name, 'status:done')"
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const number = context.issue.number;
            const labels = context.payload.issue.labels.map(l => l.name);
            const statusLabels = labels.filter(l => l.startsWith('status:'));

            // Skip if already status:done (PR merged path handles it)
            if (statusLabels.includes('status:done')) return;

            // Remove all existing status labels
            for (const label of statusLabels) {
              await github.rest.issues.removeLabel({ owner, repo, issue_number: number, name: label }).catch(() => {});
            }

            // Add status:failed (manually closed = cancelled/failed)
            await github.rest.issues.addLabels({ owner, repo, issue_number: number, labels: ['status:failed'] });

            await github.rest.issues.createComment({
              owner, repo, issue_number: number,
              body: `📝 Label synced to \`status:failed\` — task was closed manually at ${new Date().toISOString()}`
            });
