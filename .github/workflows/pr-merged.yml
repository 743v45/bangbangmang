name: On PR Merged

on:
  pull_request:
    types: [closed]

jobs:
  close-issue:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const title = context.payload.pull_request.title || '';

            // Extract issue number from "task #N" in title or "Closes #N" in body
            const match = title.match(/#(\d+)/) || body.match(/closes\s+#(\d+)/i);
            if (!match) {
              console.log('No issue reference found in PR');
              return;
            }

            const issue_number = parseInt(match[1]);

            // Update labels: remove pr-created → add done
            await github.rest.issues.removeLabel({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number, name: 'status:pr-created'
            }).catch(() => {});
            await github.rest.issues.removeLabel({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number, name: 'status:running'
            }).catch(() => {});

            await github.rest.issues.addLabels({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number, labels: ['status:done']
            });

            // Close the issue
            await github.rest.issues.update({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number, state: 'closed'
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number,
              body: `✅ PR #${context.payload.pull_request.number} merged. Task completed.`
            });
